<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin | Nova Entreprise Officiel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>

<body class="bg-slate-900 min-h-screen flex items-center justify-center">
    <div class="container mx-auto px-6">
        <div class="max-w-md mx-auto">
            <!-- Logo et titre -->
            <div class="text-center mb-8">
                <img src="logo.png" alt="Logo " class="h-20 mx-auto mb-4">
                <h1 class="text-3xl font-black text-white mb-2">🔐 Administration</h1>
                <p class="text-gray-400">Connexion requise</p>
            </div>

            <!-- Formulaire de connexion -->
            <div class="bg-slate-800 rounded-xl p-8 shadow-2xl">
                <form id="login-form" onsubmit="handleLogin(event)">
                    <!-- Identifiant -->
                    <div class="mb-6">
                        <label for="username" class="block text-gray-300 font-bold mb-2">
                            👤 Identifiant
                        </label>
                        <input 
                            type="text" 
                            id="username" 
                            name="username"
                            required
                            autocomplete="username"
                            class="w-full bg-slate-700 text-white border border-slate-600 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 transition"
                            placeholder="Votre identifiant">
                    </div>

                    <!-- Mot de passe -->
                    <div class="mb-6">
                        <label for="password" class="block text-gray-300 font-bold mb-2">
                            🔑 Mot de passe
                        </label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password"
                            required
                            autocomplete="current-password"
                            class="w-full bg-slate-700 text-white border border-slate-600 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 transition"
                            placeholder="Votre mot de passe">
                    </div>

                    <!-- Message d'erreur -->
                    <div id="error-message" class="hidden mb-4 bg-red-900/50 border border-red-600 text-red-200 rounded-lg p-3 text-sm">
                        <span class="font-bold">❌ Erreur :</span>
                        <span id="error-text"></span>
                    </div>

                    <!-- Bouton de connexion -->
                    <button 
                        type="submit" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition transform hover:scale-105">
                        🚀 Se connecter
                    </button>
                </form>

                <!-- Lien retour -->
                <div class="mt-6 text-center">
                    <a href="index.html" class="text-gray-400 hover:text-yellow-400 text-sm transition">
                        ← Retour au site
                    </a>
                </div>
            </div>

            <!-- Informations de connexion
            <div class="mt-8 bg-yellow-900/20 border border-yellow-600 rounded-lg p-4 text-sm">
                <p class="text-yellow-400 font-bold mb-3">ℹ️ Identifiants disponibles :</p>
                <div class="space-y-3">
                    <div class="bg-slate-900/50 p-3 rounded-lg">
                        <p class="text-white font-bold mb-1">👤 Admin</p>
                        <p class="text-gray-400 text-xs">Identifiant : <code class="bg-slate-700 px-2 py-1 rounded">admin</code></p>
                        <p class="text-gray-400 text-xs">Mot de passe : <code class="bg-slate-700 px-2 py-1 rounded">2026</code></p>
                    </div>
                    <div class="bg-slate-900/50 p-3 rounded-lg">
                        <p class="text-white font-bold mb-1">👤 Kevin</p>
                        <p class="text-gray-400 text-xs">Identifiant : <code class="bg-slate-700 px-2 py-1 rounded">Kevin</code></p>
                        <p class="text-gray-400 text-xs">Mot de passe : <code class="bg-slate-700 px-2 py-1 rounded">Kevin2026</code></p>
                    </div>
                </div>
                <p class="text-red-400 text-xs mt-3">⚠️ Changez ces identifiants dans api/auth.php</p>
            </div>-->
        </div>
    </div>

    <script>
        // Vérifier si déjà connecté
        if (sessionStorage.getItem('admin_logged_in') === 'true') {
            window.location.href = 'admin.html';
        }

        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');

            // Désactiver le bouton pendant la requête
            const submitBtn = event.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Connexion...';

            // Appel à l'API d'authentification
            fetch('api/auth.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: username,
                    password: password
                })
            })
            .then(async response => {
                const data = await response.json().catch(() => ({}));
                if (!response.ok && !data.message) {
                    data.message = `Erreur HTTP ${response.status}`;
                }
                return data;
            })
            .then(data => {
                if (data.success) {
                    // Connexion réussie
                    sessionStorage.setItem('admin_logged_in', 'true');
                    sessionStorage.setItem('admin_username', username);
                    sessionStorage.setItem('admin_login_time', new Date().toISOString());
                    
                    // Redirection vers l'admin
                    window.location.href = 'admin.html';
                } else {
                    // Erreur de connexion
                    errorDiv.classList.remove('hidden');
                    errorText.textContent = data.message || 'Identifiants incorrects';
                    
                    // Réactiver le bouton
                    submitBtn.disabled = false;
                    submitBtn.textContent = '🚀 Se connecter';
                }
            })
            .catch(error => {
                console.error('Erreur:', error);
                errorDiv.classList.remove('hidden');
                errorText.textContent = 'Erreur de connexion au serveur';
                
                // Réactiver le bouton
                submitBtn.disabled = false;
                submitBtn.textContent = '🚀 Se connecter';
            });
        }

        // Cacher le message d'erreur quand on tape
        document.getElementById('username').addEventListener('input', () => {
            document.getElementById('error-message').classList.add('hidden');
        });
        document.getElementById('password').addEventListener('input', () => {
            document.getElementById('error-message').classList.add('hidden');
        });
    </script>

    <footer class="py-6 text-center mt-8">
        <p class="text-gray-500 text-xs">© 2026 Tous droits réservés AlexLiveFrr — Boosté par l'Intelligence Artificielle</p>
    </footer>

</body>

</html>
